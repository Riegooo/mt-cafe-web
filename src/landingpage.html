<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LandingPage</title>

    <link rel="stylesheet" href="./stylesheets/landingpage.css">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@100..800&family=Poppins:wght@100..900&family=Righteous&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>

<body>
    <div class="main-container">
        <header>
            <nav class="navbar">
                <div class="logo">
                    <img src="./images/mt-cafe-logo.png" alt="mt-cafe-logo">
                    <span>mT Cafe</span>
                </div>

                <ul class="nav-links">
                    <li><a href="#">Home</a></li>
                    <li><a href="#">Menu</a></li>
                    <li><a href="#">About</a></li>
                </ul>

                <button class="explore-btn">
                    <span>Explore</span>
                    <i class="fa-solid fa-arrow-right"></i>
                </button>
            </nav>
        </header>

        <div class="home-container">
            <div class="home">
                <div class="home-text">
                    <h1>
                        Brewed to <span>Think</span>
                    </h1>
                    <p>
                        Not just coffee—fuel for ideas, focus,
                        <span>and late-night breakthroughs.</span>
                    </p>
                    <div class="home-buttons">
                        <button class="order-btn">
                            <span>ORDER NOW</span>
                            <i class="fa-solid fa-arrow-right"></i>
                        </button>

                        <button class="explore-more-btn">
                            EXPLORE MORE
                        </button>
                    </div>
                </div>

                <div class="home-image">
                    <img src="./images/landingpage-home-coffee-icon.png" alt="coffee">
                </div>

            </div>
        </div>

    </div>
</body>
</html>
