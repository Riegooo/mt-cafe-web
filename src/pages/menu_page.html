<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>mT Cafe - Menus</title>
    <link rel="stylesheet" href="../stylesheets/menu_page.css">
    <link rel="icon" type="image/x-icon" href="../images/mt-cafe_logo-removebg-preview.png">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@100..800&family=Poppins:wght@100..900&family=Righteous&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body>
    <div class="main-container">
        <div class="side-bar">
            <div class="sidebar-header">
                <h1>Categories</h1>
            </div>

            <nav class="sidebar-nav-links">
                <button id="hot_beverage" class="selected">
                    <i class="fa-solid fa-mug-hot"></i>
                    <h1>Hot Beverages</h1>
                </button>

                <button id="cold_beverage">
                    <i class="fa-solid fa-mug-saucer"></i>
                    <h1>Cold Beverages</h1>
                </button>

                <button id="bread">
                    <i class="fa-solid fa-bread-slice"></i>
                    <h1>Bread</h1>
                </button>

                <button id="food">
                    <i class="fa-solid fa-bowl-food"></i>
                    <h1>Food</h1>
                </button>

                <button id="dessert">
                    <i class="fa-solid fa-cookie"></i>
                    <h1>Desserts</h1>
                </button>
            </nav>

            <div class="cart-button">
                <a href="./usercart_page.html">
                    <i class="fa-solid fa-cart-arrow-down"></i>
                    <span>View Cart</span>
                </a>
            </div>
        </div>

        <div class="left-contents">
            <div class="header">
                <div class="header-text">
                    <a href="../index.html">
                        <img src="../images/mt-cafe_logo-removebg-preview.png" alt="">
                        <h1>mT Cafe MENU</h1>
                    </a>

                    <div class="header-menu" id="menu-toggle">
                        <i class="fa-solid fa-bars menu-icon" style="color: rgb(253, 251, 212);"></i>
                    </div>
                </div>
            </div>

            <div class="left-menu-contents">
                <div class="menu-items" id="menu">
                    
                </div>
            </div>
        </div>
    </div>

    <section class="payment_section">
        
    </section>
    
    <script src="../Javascript/menu.js"></script>

</body>
</html>
