<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LandingPage</title>

    <link rel="stylesheet" href="style.css">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@100..800&family=Poppins:wght@100..900&family=Righteous&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>

<body>
    <header>
        <div class="logo">
            <img src="../src/images/mt-cafe-logo.png" alt="">
            <h1>mT Cafe</h1>
        </div>

        <ul>
            <li><a href="#home">Home</a></li>
            <li><a href="">Menu</a></li>
            <li><a href="">About</a></li>
        </ul>

        <div class="header-button">
            <button>
                <span>ORDER NOW</span>
                <i class="fa-solid fa-arrow-right"></i>
            </button>
        </div>
    </header>

    <div class="main-container">
        <div class="home-section" id="home">
            <div class="home-left-content">
                <h1>
                    Brewed to <span>Think</span>
                </h1>
                <p>
                    Not just coffee—fuel for ideas, focus,
                    <span>and late-night breakthroughs.</span>
                </p>

                <div class="home-buttons">
                    <button class="order-btn">
                        <span>ORDER NOW</span>
                        <i class="fa-solid fa-arrow-right"></i>
                    </button>

                    <button class="explore-btn">
                        EXPLORE MORE
                    </button>
                </div>
            </div>

            <div class="home-right-content">
                <img src="../src/images/landingpage-home-coffee-icon.png" alt="">
            </div>
        </div>

        <div class="menu-section">
            
        </div>
    </div>
</body>
</html>
